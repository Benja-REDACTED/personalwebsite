<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    .container {
      display: grid;
      align-items: center;
      background-color: #1eff87;
      padding: 30px;
      grid-template-columns: repeat(3, minmax(0px, 1fr));
      grid-template-rows: repeat(2, minmax(0px, 1fr));
    }
    .container img {
      width: 100%;
      height: 100%;
      object-fit: fill; /* This causes the distortion */
    }
    .funny_image {
      border: black solid 5px;
    }
    .info_container {
      background-color: #1eff87;
      border: black solid 5px;
      padding: 20px;
    }
  </style>
</head>
<body>
<main id="app">
  <img src="Mainlogo.gif" alt="worlds best logo">
  <div class="info_container">
    <h2>images :3</h2>
    Click to view images
    <details>
      <summary></summary>
      <p>
        <div class="container">
          <img src="cursed%20images/townofhouse.jpg" alt="image" class="funny_image">
          <img src="cursed%20images/ceosvsgum.jpg" alt="image" class="funny_image">
          <img src="cursed%20images/immortalscammerDX.jpg" alt="image" class="funny_image">
          <img src="cursed%20images/mixed.jpg" alt="image" class="funny_image">
          <img src="cursed%20images/ungrateforyourliver.jpg" alt="image" class="funny_image">
          <img src="cursed%20images/kriswherethefuckarewehowareweinultrakill.jpeg" alt="image" class="funny_image">
          lalalalal
        </div>
      </p>
    </details>
  </div>
</main>
<script type="module" src="/main.js"></script>
</body>
</html>
